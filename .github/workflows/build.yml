name: build-turbopack-wasi

on:
  workflow_dispatch:
    inputs:
      next_version:
        description: "next.js release tag (e.g. v16.2.10)"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: vendor/next.js
          key: wasi-${{ inputs.next_version }}

      - name: Install binaryen + brotli
        run: sudo apt-get update && sudo apt-get install -y binaryen brotli

      - name: Build
        run: |
          # setup.sh downloads wasi-sdk (x86_64-linux on this runner) and the
          # pinned nightly from the vendored rust-toolchain.toml
          bash scripts/build.sh "${{ inputs.next_version }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-swc-wasi-${{ inputs.next_version }}
          path: dist/${{ inputs.next_version }}
          if-no-files-found: error
